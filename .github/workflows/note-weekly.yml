name: Note記事生成（週次）

on:
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 9:00 JST (UTC+9)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（ファイル保存のみ、コミットしない）'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: note-weekly
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-note.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-note.txt

      - name: Generate note article
        run: python scripts/generate_note_article.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit draft
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add note-drafts/
          if git diff --cached --quiet; then
            echo "Nothing to commit — draft unchanged"
            exit 0
          fi
          git commit -m "feat(note): 週次記事草稿を生成 [skip ci] [vercel skip]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
