name: Post Tweet

on:
  schedule:
    - cron: '0 3 * * *'   # 12:00 JST (UTC+9)
    - cron: '0 12 * * *'  # 21:00 JST (UTC+9)
  workflow_dispatch:
    inputs:
      csv_path:
        description: 'CSV file path (e.g. x_posts_week1.csv)'
        default: 'x_posts_week1.csv'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Post tweet
        run: python scripts/post_tweet.py ${{ github.event.inputs.csv_path || 'x_posts_week1.csv' }}
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
