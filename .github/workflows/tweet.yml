name: Post Tweet

on:
  schedule:
    - cron: '0 3 * * *'   # 12:00 JST (UTC+9)
    - cron: '0 5 * * *'   # 14:00 JST — 12:00分の遅延・失敗の拾い直し
    - cron: '0 12 * * *'  # 21:00 JST (UTC+9)
    - cron: '30 13 * * *' # 22:30 JST — 21:00分の遅延・失敗の拾い直し
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（実際には投稿しない）'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: post-tweet
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements*.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt -r scripts/requirements-dev.txt

      - name: Run tests
        run: python -m pytest scripts -v

  post:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements*.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Post tweet
        run: python scripts/post_tweet.py
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '' }}

      - name: Commit run summary
        if: always()
        run: |
          if [ ! -f logs/post_summary.md ]; then
            echo "No summary file — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs/post_summary.md
          if git diff --cached --quiet; then
            echo "Summary unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "chore(log): X投稿サマリー更新 [skip ci] [vercel skip]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
